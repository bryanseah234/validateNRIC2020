name: Auto-merge Bot PRs
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge-on-open:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' && (
        github.event.pull_request.user.login == 'snyk-bot' ||
        github.event.pull_request.user.login == 'sourcery-ai[bot]'
      )
    steps:
      - name: Auto-merge bot PR
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sweep-existing-bot-prs:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Merge open bot PRs
        run: |
          for login in "snyk-bot" "sourcery-ai[bot]"; do
            gh pr list --author "$login" --state open --json number --jq '.[].number' \
            | while IFS= read -r pr; do
                echo "Merging PR #$pr from $login"
                gh pr merge --auto --squash "#$pr" || echo "Skip #$pr"
              done
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
